<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#065F46" />
      <stop offset="100%" stop-color="#064E3B" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="45%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#064E3B" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bg)" />
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#glow)" />

  <!-- Heart — geometrically precise, slightly larger, centered higher -->
  <g transform="translate(512, 400)">
    <path d="M0 108
             C-10 97, -38 66, -70 32
             C-106 -6, -136 -42, -136 -80
             C-136 -124, -106 -152, -70 -152
             C-42 -152, -18 -134, 0 -108
             C18 -134, 42 -152, 70 -152
             C106 -152, 136 -124, 136 -80
             C136 -42, 106 -6, 70 32
             C38 66, 10 97, 0 108 Z"
          fill="white" />
  </g>

  <!-- Cradling arc — single smooth curve, thicker, more confident -->
  <path d="M300 640 C370 714, 460 748, 512 748 C564 748, 654 714, 724 640"
        fill="none" stroke="white" stroke-width="36"
        stroke-linecap="round" opacity="0.9" />
</svg>
